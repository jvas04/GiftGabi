<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para ti, Gabi 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #fff0f5 0%, #ffe4ef 50%, #ffd6e8 100%);
      font-family: 'Lato', sans-serif;
      padding: 2rem 1rem;
    }

    .petal {
      position: fixed;
      border-radius: 50% 0 50% 0;
      opacity: 0.15;
      pointer-events: none;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 480px;
      width: 100%;
      gap: 1.2rem;
    }

    .badge {
      background: rgba(255,255,255,0.65);
      border: 1px solid #f9aac8;
      border-radius: 30px;
      padding: 6px 22px;
      font-size: 11px;
      color: #c2557a;
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      color: #a83060;
      line-height: 1.3;
    }

    h1 em { font-style: italic; color: #d4517a; }

    .subtitle {
      font-size: 1rem;
      color: #c07090;
      font-weight: 300;
      line-height: 1.7;
      max-width: 360px;
    }

    .btn {
      background: linear-gradient(135deg, #e8507a, #c2385f);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 15px 38px;
      font-size: 1rem;
      font-family: 'Lato', sans-serif;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(194,56,95,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 0.5rem;
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(194,56,95,0.38); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.6; cursor: default; transform: none; }

    .card {
      background: rgba(255,255,255,0.88);
      border: 1px solid #f9b8cc;
      border-radius: 20px;
      padding: 1.6rem 2rem;
      width: 100%;
      display: none;
      flex-direction: column;
      gap: 0.8rem;
      animation: fadeUp 0.4s ease;
    }

    .card.visible { display: flex; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-date {
      font-size: 11px;
      color: #c07090;
      letter-spacing: 1.8px;
      text-transform: uppercase;
    }

    .card-msg {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: #7a2040;
      font-style: italic;
      line-height: 1.8;
    }

    .hearts { color: #e8507a; letter-spacing: 5px; font-size: 13px; }

    .loading { color: #c07090; font-size: 0.9rem; font-style: italic; }
  </style>
</head>
<body>

  <div class="petal" style="width:260px;height:260px;background:#f9b8cc;top:-80px;left:-80px;transform:rotate(30deg)"></div>
  <div class="petal" style="width:180px;height:180px;background:#f4a0bf;bottom:-50px;right:-40px;transform:rotate(-20deg)"></div>
  <div class="petal" style="width:110px;height:110px;background:#f9b8cc;bottom:80px;left:30px;transform:rotate(15deg)"></div>

  <div class="container">
    <div class="badge">✦ Felices 2 meses ✦</div>

    <h1>Para ti, <em>vida mía</em> 🌸</h1>

    <p class="subtitle">
      Agradezco cada dia, cada hora, cada minuto, y cada segundo en el que estoy contigo.<br/>
      Aquí hay un mensajito solo para hoy...
    </p>

    <button class="btn" id="btn" onclick="mostrarMensaje()">
      <span>♡</span> Ver mi mensaje del día
    </button>

    <div class="card" id="card">
      <div class="card-date" id="fecha"></div>
      <div class="card-msg" id="msg">Cargando...</div>
      <div class="hearts">♥ ♥ ♥</div>
    </div>
  </div>

  <script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQcPZW7aAlZB7wGCgDcM2bFUJ6_pVluPGEUro_N4DebEa5h2GWibIkVY5AW0WSlmZkfshHdI1SDo3sR/pub?gid=0&single=true&output=csv';

    async function mostrarMensaje() {
      const btn = document.getElementById('btn');
      const card = document.getElementById('card');
      const msgEl = document.getElementById('msg');
      const fechaEl = document.getElementById('fecha');

      btn.disabled = true;
      btn.innerHTML = '<span>♡</span> Cargando...';
      card.classList.add('visible');
      msgEl.textContent = 'Un momento...';

      try {
        const proxy = 'https://corsproxy.io/?' + encodeURIComponent(SHEET_URL);
        const res = await fetch(SHEET_URL);
        const text = await res.text();

        const mensajes = text
          .split('\n')
          .map(l => l.trim().replace(/^"|"$/g, ''))
          .filter(l => l.length > 0);

        if (mensajes.length === 0) throw new Error('Sin mensajes');

        // Semilla basada en la fecha → mismo mensaje todo el día
        const hoy = new Date();
        const seed = hoy.getFullYear() * 10000 + (hoy.getMonth() + 1) * 100 + hoy.getDate();
        const indice = seed % mensajes.length;

        const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        fechaEl.textContent = hoy.toLocaleDateString('es-CO', opciones);
        msgEl.textContent = mensajes[indice];

      } catch (e) {
        msgEl.textContent = 'No pude cargar el mensaje, por favor contacta a tu noviecito para que funcione.';
      }

      btn.innerHTML = '<span>♡</span> Ver mi mensaje del día';
      btn.disabled = false;
    }
  </script>

</body>
</html>
